<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicons -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="512x512" href="/android-chrome-512x512.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ZucaPortal</title>

    <style>
      /* Splash screen container */
      #splash {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        background: url('/src/assets/background.webp') center/cover no-repeat;
        z-index: 9999;
        overflow: hidden;
        color: white;
        font-family: 'Arial', sans-serif;
        text-align: center;
      }

      /* Gradient overlay animation */
      #splash::before {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(-45deg, rgba(49,15,221,0.5), rgba(0,0,0,0.6), rgba(49,15,221,0.5));
        background-size: 400% 400%;
        animation: gradientMove 15s ease infinite;
        z-index: 1;
      }

      /* Logo */
      #splash img {
        position: relative;
        z-index: 2;
        width: 150px;
        max-width: 40%;
        animation: fadeIn 1.2s ease forwards;
      }

      /* Typing welcome text */
      #welcome {
        position: relative;
        z-index: 2;
        margin-top: 20px;
        font-size: 24px;
        font-weight: bold;
        white-space: nowrap;
        border-right: 3px solid rgba(255,255,255,0.75);
        overflow: hidden;
      }

      /* Bottom credits */
      #credits {
        position: absolute;
        bottom: 20px;
        width: 100%;
        text-align: center;
        z-index: 2;
        font-size: 12px;
        letter-spacing: 2px;
        opacity: 0.7;
      }

      /* Animations */
      @keyframes fadeIn {
        0% {opacity: 0; transform: scale(0.8);}
        100% {opacity: 1; transform: scale(1);}
      }

      @keyframes gradientMove {
        0% {background-position: 0% 50%;}
        50% {background-position: 100% 50%;}
        100% {background-position: 0% 50%;}
      }

      /* Responsive adjustments */
      @media (max-width: 768px) {
        #splash img {
          width: 120px;
        }
        #welcome {
          font-size: 20px;
        }
        #credits {
          font-size: 10px;
        }
      }

      @media (max-width: 480px) {
        #splash img {
          width: 100px;
        }
        #welcome {
          font-size: 18px;
        }
        #credits {
          font-size: 9px;
        }
      }
    </style>
  </head>

  <body>
    <!-- Splash Screen -->
    <div id="splash">
      <img src="/src/assets/zuca-logo.png" alt="ZUCA Logo" />
      <div id="welcome"></div>
      <div id="credits">BUILT BY CHRISTECH WEBSYS</div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <!-- React Entry -->
    <script type="module" src="/src/main.jsx"></script>

    <script>
      // Typing effect for "Welcome to Zuca Portal" with erase/retype
      const welcomeText = "Welcome to Zuca Portal";
      const welcomeEl = document.getElementById("welcome");
      let i = 0;
      let forward = true;

      function typeEffect() {
        if (forward) {
          welcomeEl.textContent = welcomeText.slice(0, i + 1);
          i++;
          if (i === welcomeText.length) forward = false;
        } else {
          welcomeEl.textContent = welcomeText.slice(0, i - 1);
          i--;
          if (i === 0) forward = true;
        }
        setTimeout(typeEffect, 150);
      }
      typeEffect();

      // Smoothly hide splash once React is ready
      window.addEventListener('load', () => {
        const splash = document.getElementById('splash');
        if (!splash) return;
        splash.style.transition = 'opacity 0.5s ease';
        splash.style.opacity = '0';
        setTimeout(() => splash.remove(), 500);
      });
    </script>
  </body>
</html>
